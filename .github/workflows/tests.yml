name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Run unittest suite under coverage
        run: uv run --python 3.13 --group dev coverage run -m unittest discover -s tests -v

      - name: Coverage report (log)
        run: uv run --python 3.13 --group dev coverage report

      - name: Coverage report (job summary)
        run: |
          {
            echo "## Coverage"
            echo
            echo '```'
            uv run --python 3.13 --group dev coverage report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Export coverage XML
        run: uv run --python 3.13 --group dev coverage xml -o coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: error
